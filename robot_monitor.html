<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Longjack AGV - Live Vision Monitor (JMuxer)</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #2d2d2d;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 90%;
        }
        h2 {
            color: #00ffcc;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        #status-bar {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            background-color: #444;
        }
        .connecting { color: #ffcc00; background-color: #443c1c !important; }
        .connected { color: #00ff66; background-color: #1c4427 !important; }
        .disconnected { color: #ff3333; background-color: #441c1c !important; }
        
        video {
            width: 100%;
            max-width: 720px;
            border: 2px solid #555;
            border-radius: 8px;
            background-color: #000;
        }
        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
</head>
<body>

<div class="container">
    <h2>🤖 Longjack Camera AI Detect</h2>
    <div id="status-bar" class="connecting">⏳ กำลังเตรียมการเชื่อมต่อ...</div>
    
    <br>
    <video id="robot-video" autoplay muted playsinline></video>
    
    <div class="footer">
        ท่อสัญญาณ: /rgb_cameras/front_augmented/video | โหมดดีเลย์ต่ำพิเศษ (flushingTime: 0)
    </div>
</div>

<script>
    const ROBOT_IP = "192.168.12.1"; // พิกัด IP หุ่นยนต์ Longjack ของคุณ
    const PORT = "8090";
    const WS_URL = `ws://${ROBOT_IP}:${PORT}/ws/v2/topics`;
    const VIDEO_TOPIC = "/rgb_cameras/front_augmented/video";

    const statusBar = document.getElementById('status-bar');

    // 1. ⚙️ สร้างตัวแกะรหัส JMuxer และตั้งค่าเด็ดขาดตามคู่มือ: flushingTime เป็น 0 เพื่อไม่ให้ภาพดีเลย์
    const jmuxer = new JMuxer({
        node: 'robot-video', 
        mode: 'video',
        flushingTime: 0,     // 🎯 เคลียร์บัฟเฟอร์ทันที ดันภาพสดแบบลื่นไหลไร้ดีเลย์
        clearBuffer: true
    });

    // 2. 🔌 เริ่มต้นเปิดท่อเชื่อมต่อ WebSocket ไปที่หุ่นยนต์
    console.log(`🤖 กำลังเชื่อมต่อไปยัง WebSocket: ${WS_URL}`);
    statusBar.innerText = "🔌 กำลังเชื่อมต่อไปยังหุ่นยนต์...";
    statusBar.className = "connecting";

    const ws = new WebSocket(WS_URL);
    ws.binaryType = 'arraybuffer'; // ตั้งค่าประเภทการรับข้อมูลดิบแบบ Binary

    ws.onopen = () => {
        console.log("✅ เชื่อมต่อท่อส่งข้อมูลสำเร็จ!");
        statusBar.innerText = "🟢 เชื่อมต่อระบบกล้องหุ่นยนต์สำเร็จ";
        statusBar.className = "connected";

        // ส่ง Payload สั่งให้หุ่นยนต์เริ่มส่งสัญญาณสตรีมภาพตีกรอบ AI ออกมา
        const payload = { "enable_topic": VIDEO_TOPIC };
        ws.send(JSON.stringify(payload));
    };

    ws.onmessage = (event) => {
        try {
            // แกะข้อมูล JSON ที่หุ่นยนต์ส่งมา
            const response = JSON.parse(event.data);
            
            if (response.topic === VIDEO_TOPIC && response.data) {
                // 3. 🛠️ ถอดรหัสข้อความจาก Base64 กลับเป็น ArrayBuffer (Binary ดิบของ H.264)
                const rawData = atob(response.data);
                const bytes = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; i++) {
                    bytes[i] = rawData.charCodeAt(i);
                }
                
                // 4. 🔥 ส่งก้อนข้อมูลดิบ H.264 ป้อนเข้าปากท่อ JMuxer เพื่อวาดภาพขึ้นจอทันที!
                jmuxer.feed({
                    video: bytes
                });
            }
        } catch (e) {
            // ส่วนดักจับกรณีแพ็กเก็ตเริ่มต้นบางตัวอาจมาเป็นไบนารีตรงๆ
            if (event.data instanceof ArrayBuffer) {
                jmuxer.feed({
                    video: new Uint8Array(event.data)
                });
            }
        }
    };

    ws.onerror = (error) => {
        console.error("❌ WebSocket เจอข้อผิดพลาด:", error);
        statusBar.innerText = "⚠️ การเชื่อมต่อมีปัญหา (สัญญาณขาดหาย)";
        statusBar.className = "disconnected";
    };

    ws.onclose = () => {
        console.log("🔒 ปิดการเชื่อมต่อท่อสัญญาณแล้ว");
        statusBar.innerText = "🔴 การเชื่อมต่อปิดตัวลง (Disconnected)";
        statusBar.className = "disconnected";
    };
</script>

</body>
</html>
